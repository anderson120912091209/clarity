<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 595 842" width="595" height="842">
  <rect width="595" height="842" fill="white"/>

  <!-- Title block -->
  <text x="297" y="100" font-family="'Computer Modern', Georgia, serif" font-size="20" font-weight="bold" fill="#1a1a1a" text-anchor="middle">Assignment Title</text>
  <text x="297" y="130" font-family="'Computer Modern', Georgia, serif" font-size="14" fill="#333" text-anchor="middle">Student Name</text>
  <text x="297" y="155" font-family="'Computer Modern', Georgia, serif" font-size="12" fill="#555" text-anchor="middle">February 25, 2026</text>

  <!-- Problem 1 -->
  <text x="72" y="210" font-family="'Computer Modern', Georgia, serif" font-size="16" font-weight="bold" fill="#1a1a1a">Problem 1</text>
  <text x="72" y="238" font-family="'Computer Modern', Georgia, serif" font-size="11" fill="#333">State the problem here.</text>

  <!-- Solution box -->
  <text x="72" y="272" font-family="'Computer Modern', Georgia, serif" font-size="11" font-style="italic" fill="#333">Solution.</text>
