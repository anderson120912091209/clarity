  <!-- QED square -->
  <rect x="505" y="286" width="8" height="8" fill="none" stroke="#333" stroke-width="1"/>

  <!-- Problem 2 -->
  <text x="72" y="346" font-family="'Computer Modern', Georgia, serif" font-size="16" font-weight="bold" fill="#1a1a1a">Problem 2</text>
  <text x="72" y="374" font-family="'Computer Modern', Georgia, serif" font-size="11" fill="#333">State the next problem.</text>

  <!-- Solution box -->
  <text x="72" y="408" font-family="'Computer Modern', Georgia, serif" font-size="11" font-style="italic" fill="#333">Solution.</text>
