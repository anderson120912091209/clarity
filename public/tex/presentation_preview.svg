<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 595 842" width="595" height="842">
  <rect width="595" height="842" fill="#1a1f2e"/>

  <!-- Slide preview centered in portrait frame -->
  <rect x="32" y="60" width="531" height="299" rx="6" fill="#23373B"/>

  <!-- Metropolis progress bar -->
  <rect x="32" y="60" width="531" height="4" rx="2" fill="#EB811B"/>

  <!-- Title text -->
  <text x="64" y="175" font-family="'Fira Sans', 'Helvetica Neue', Arial, sans-serif" font-size="28" font-weight="300" fill="white">Presentation Title</text>

  <!-- Subtitle -->
  <text x="64" y="205" font-family="'Fira Sans', 'Helvetica Neue', Arial, sans-serif" font-size="13" font-weight="300" fill="rgba(255,255,255,0.65)">A concise subtitle for context</text>

  <!-- Separator -->
  <line x1="64" y1="220" x2="530" y2="220" stroke="#EB811B" stroke-width="1.2"/>

  <!-- Author -->
  <text x="64" y="248" font-family="'Fira Sans', 'Helvetica Neue', Arial, sans-serif" font-size="11" font-weight="400" fill="rgba(255,255,255,0.8)">Author Name</text>
  <text x="64" y="266" font-family="'Fira Sans', 'Helvetica Neue', Arial, sans-serif" font-size="10" font-weight="300" fill="rgba(255,255,255,0.45)">Department of Computer Science — University Name</text>

  <!-- Bottom progress bar on slide -->
  <rect x="32" y="354" width="531" height="5" rx="0" fill="rgba(255,255,255,0.06)"/>
  <rect x="32" y="354" width="66" height="5" fill="#EB811B"/>

  <!-- Second slide: content preview -->
  <rect x="32" y="395" width="531" height="299" rx="6" fill="#FAFAFA"/>

  <!-- Frame title bar -->
  <rect x="32" y="395" width="531" height="36" rx="6" fill="#23373B"/>
  <rect x="32" y="420" width="531" height="11" fill="#23373B"/>
  <text x="52" y="418" font-family="'Fira Sans', 'Helvetica Neue', Arial, sans-serif" font-size="14" font-weight="400" fill="white">Motivation</text>

  <!-- Progress bar -->
  <rect x="32" y="431" width="531" height="3" fill="rgba(0,0,0,0.06)"/>
  <rect x="32" y="431" width="132" height="3" fill="#EB811B"/>

  <!-- Bullet items -->
  <circle cx="62" cy="462" r="3" fill="#23373B"/>
  <text x="76" y="466" font-family="'Fira Sans', 'Helvetica Neue', Arial, sans-serif" font-size="11" fill="#333">Why does this problem matter?</text>

  <circle cx="62" cy="490" r="3" fill="#23373B"/>
  <text x="76" y="494" font-family="'Fira Sans', 'Helvetica Neue', Arial, sans-serif" font-size="11" fill="#333">What gap in knowledge are we addressing?</text>

  <circle cx="62" cy="518" r="3" fill="#23373B"/>
  <text x="76" y="522" font-family="'Fira Sans', 'Helvetica Neue', Arial, sans-serif" font-size="11" fill="#333">What is the key insight of our approach?</text>

  <!-- Third slide hint -->
  <rect x="32" y="730" width="531" height="60" rx="6" fill="#23373B" opacity="0.3"/>
  <rect x="32" y="730" width="531" height="4" rx="2" fill="#EB811B" opacity="0.3"/>

  <!-- Branding -->
  <text x="530" y="818" font-family="'Fira Sans', 'Helvetica Neue', Arial, sans-serif" font-size="8" fill="rgba(255,255,255,0.25)" text-anchor="end">metropolis</text>
</svg>
