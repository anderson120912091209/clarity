  <text x="72" y="402" font-family="Georgia, 'Linux Libertine', serif" font-size="12" font-weight="bold" fill="#333">Part B</text>
  <text x="72" y="422" font-family="Georgia, 'Linux Libertine', serif" font-size="10" fill="#333">Solution for Part B.</text>

  <!-- Problem 3 -->
  <text x="72" y="462" font-family="Georgia, 'Linux Libertine', serif" font-size="15" font-weight="bold" fill="#1a1a1a">Problem 3</text>
  <line x1="72" y1="469" x2="523" y2="469" stroke="#ddd" stroke-width="0.5"/>

  <text x="72" y="492" font-family="Georgia, 'Linux Libertine', serif" font-size="10" fill="#333">Final problem solution.</text>

  <text x="523" y="820" font-family="'Helvetica Neue', Arial, sans-serif" font-size="7" fill="#bbb" text-anchor="end">academic-alt</text>
